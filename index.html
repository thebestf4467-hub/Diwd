<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سما الكرم | للأثاث والديكور الداخلي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Changa:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --vanilla: #e8dcc4; --dark: #2c2c2c; --gold: #b8915e; --light-brown: #a67c52; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background-color: #fcfcfc; color: var(--dark); font-family: 'Cairo', sans-serif; direction: rtl; }

        header { position: sticky; top: 0; z-index: 2000; background: #fff; padding: 15px 0; border-bottom: 2px solid var(--vanilla); text-align: center; }
        .logo { font-size: 2.2rem; font-family: 'Changa', sans-serif; font-weight: 800; cursor: pointer; }
        
        .welcome-hero { 
            padding: 80px 20px; text-align: center; 
            background: linear-gradient(rgba(232, 220, 196, 0.85), rgba(255, 255, 255, 0.9));
            margin-bottom: 30px;
        }
        .welcome-hero h1 { font-family: 'Changa'; font-size: 2.8rem; color: var(--dark); margin-bottom: 15px; }
        .welcome-hero p { font-size: 1.2rem; color: #444; max-width: 700px; margin: auto; line-height: 1.8; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        .cats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .cat-card { background: #fff; border-radius: 20px; padding: 40px; text-align: center; border: 1px solid #eee; cursor: pointer; transition: 0.4s; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .cat-card:hover { transform: translateY(-10px); border-color: var(--gold); background: #fff9f0; }
        .cat-card i { font-size: 3.5rem; color: var(--gold); margin-bottom: 15px; }

        /* زر العودة المطور */
        .back-container { text-align: center; margin-bottom: 30px; }
        .btn-back-large { 
            display: inline-block; background: var(--dark); color: #fff; padding: 15px 40px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.3rem; 
            transition: 0.3s; border: 2px solid var(--gold); cursor: pointer;
        }
        .btn-back-large:hover { background: var(--gold); transform: scale(1.05); }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .work-card { background: #fff; border-radius: 15px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .work-card img { width: 100%; height: 350px; object-fit: cover; }

        /* زر الواتساب البني الفاتح */
        .btn-wa-brown { 
            display: block; background: var(--light-brown); color: #fff; text-align: center; 
            padding: 12px; text-decoration: none; font-weight: bold; border-radius: 10px; 
            margin-top: 10px; transition: 0.3s; font-size: 1.1rem;
        }
        .btn-wa-brown:hover { background: var(--gold); }

        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; padding: 10px; overflow-y: auto; }
        .modal { background: #fff; padding: 20px; border-radius: 20px; max-width: 600px; margin: 20px auto; width: 95%; }
        
        input, select, .admin-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo'; }
        .admin-btn { background: var(--gold); color: white; border: none; font-weight: bold; cursor: pointer; }

        .icon-picker { display: flex; flex-wrap: wrap; gap: 8px; background: #f9f9f9; padding: 10px; border-radius: 10px; margin: 5px 0; }
        .icon-item { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #fff; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        .icon-item.selected { background: var(--gold); color: #fff; }

        .manage-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; background: #fdfdfd; margin-bottom: 5px; border-radius: 8px; }
        
        .admin-nav { display: flex; gap: 8px; margin-bottom: 15px; }
        .admin-nav button { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        .active-tab { background: var(--dark) !important; color: white; }
    </style>
</head>
<body>

    <header><div class="logo" onclick="openAdmin()">سما الكرم</div></header>

    <div id="main-view">
        <section class="welcome-hero" id="hero-welcome">
            <h1>سما الكرم للأثاث والديكور الداخلي</h1>
            <p>نصمم لك عالمك الخاص بأجود أنواع الخشب والتصاميم العصرية. متخصصون في صناعة المطابخ الحديثة، غرف الملابس، والأثاث المودرن.</p>
        </section>
        <div class="container" id="content-area"></div>
    </div>

    <div id="admin-panel">
        <div class="modal">
            <div class="admin-nav">
                <button id="tab1" class="active-tab" onclick="switchTab(1)">إدارة الأقسام</button>
                <button id="tab2" onclick="switchTab(2)">إضافة أعمال</button>
                <button onclick="closeAdmin()" style="background:#eee">إغلاق</button>
            </div>

            <div id="sec1">
                <input type="hidden" id="edit-cat-id">
                <input type="text" id="cat-name-in" placeholder="اسم القسم الجديد...">
                <div class="icon-picker">
                    <div class="icon-item" onclick="pickIcon('fas fa-utensils', this)"><i class="fas fa-utensils"></i></div>
                    <div class="icon-item" onclick="pickIcon('fas fa-couch', this)"><i class="fas fa-couch"></i></div>
                    <div class="icon-item" onclick="pickIcon('fas fa-bed', this)"><i class="fas fa-bed"></i></div>
                    <div class="icon-item" onclick="pickIcon('fas fa-tshirt', this)"><i class="fas fa-tshirt"></i></div>
                    <div class="icon-item" onclick="pickIcon('fas fa-chair', this)"><i class="fas fa-chair"></i></div>
                    <div class="icon-item" onclick="pickIcon('fas fa-hammer', this)"><i class="fas fa-hammer"></i></div>
                    <div class="icon-item" onclick="pickIcon('fas fa-lightbulb', this)"><i class="fas fa-lightbulb"></i></div>
                    <div class="icon-item" onclick="pickIcon('fas fa-tv', this)"><i class="fas fa-tv"></i></div>
                    <div class="icon-item" onclick="pickIcon('fas fa-door-closed', this)"><i class="fas fa-door-closed"></i></div>
                </div>
                <input type="hidden" id="cat-icon-in" value="fas fa-couch">
                <button class="admin-btn" id="cat-save-btn" onclick="saveCategory()">حفظ القسم</button>
                <div id="admin-cats-display" style="margin-top:15px"></div>
            </div>

            <div id="sec2" style="display:none">
                <input type="text" id="w-title-in" placeholder="عنوان العمل">
                <input type="text" id="w-link-in" placeholder="رابط الصورة المباشر">
                <select id="w-cat-sel-in"></select>
                <button class="admin-btn" style="background:var(--dark)" onclick="saveWork()">نشر العمل</button>
            </div>

            <div id="sec-imgs" style="display:none">
                <button onclick="switchTab(1)" style="border:none; color:var(--gold); cursor:pointer; background:none; margin-bottom:10px;">← عودة</button>
                <div id="imgs-control-list"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyB_Rj089s8Pwh5hrZjzAcki-gN7VL8JhB0",
          authDomain: "diwd-a7709.firebaseapp.com",
          databaseURL: "https://diwd-a7709-default-rtdb.firebaseio.com/",
          projectId: "diwd-a7709",
          storageBucket: "diwd-a7709.appspot.com",
          appId: "1:190314181686:web:97b7f8674522bdbb4d5497"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let appData = { works: {}, categories: {} };

        db.ref().on('value', snap => {
            appData = snap.val() || { works: {}, categories: {} };
            renderHome();
            refreshAdmin();
        });

        function renderHome() {
            const area = document.getElementById('content-area');
            document.getElementById('hero-welcome').style.display = 'block';
            let html = `<div class="cats-grid">`;
            for(let id in appData.categories) {
                let c = appData.categories[id];
                html += `<div class="cat-card" onclick="showGallery('${c.name}')">
                    <i class="${c.icon || 'fas fa-couch'}"></i>
                    <h3>${c.name}</h3>
                    <p style="color:var(--gold); margin-top:5px;">تصفح التصاميم ←</p>
                </div>`;
            }
            area.innerHTML = html + `</div>`;
        }

        function showGallery(catName) {
            document.getElementById('hero-welcome').style.display = 'none';
            const area = document.getElementById('content-area');
            
            // الهيدر المطور لزر العودة
            let html = `
                <div class="back-container">
                    <div class="btn-back-large" onclick="renderHome()">
                        <i class="fas fa-arrow-right"></i> العودة للأقسام الرئيسية
                    </div>
                </div>
                <h2 style="font-family:'Changa'; text-align:center; margin-bottom:40px; font-size:2rem; color:var(--gold); border-bottom:2px solid var(--vanilla); padding-bottom:15px;">${catName}</h2>
                <div class="gallery">`;

            for(let id in appData.works) {
                if(appData.works[id].cat === catName) {
                    html += `<div class="work-card">
                        <img src="${appData.works[id].link}">
                        <div style="padding:15px; text-align:center;">
                            <strong style="font-size:1.1rem">${appData.works[id].title}</strong>
                            <a href="https://wa.me/9647839529360" class="btn-wa-brown">
                                <i class="fab fa-whatsapp"></i> تواصل لطلب التصميم
                            </a>
                        </div>
                    </div>`;
                }
            }
            area.innerHTML = html + `</div>`;
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function openAdmin() { if(prompt("الباسورد:") === "1234") document.getElementById('admin-panel').style.display='block'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }

        function switchTab(n) {
            document.getElementById('sec1').style.display = (n===1)?'block':'none';
            document.getElementById('sec2').style.display = (n===2)?'block':'none';
            document.getElementById('sec-imgs').style.display = 'none';
            document.getElementById('tab1').className = (n===1)?'active-tab':'';
            document.getElementById('tab2').className = (n===2)?'active-tab':'';
        }

        function pickIcon(code, el) {
            document.querySelectorAll('.icon-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('cat-icon-in').value = code;
        }

        function saveCategory() {
            const id = document.getElementById('edit-cat-id').value;
            const name = document.getElementById('cat-name-in').value;
            const icon = document.getElementById('cat-icon-in').value;
            if(name) {
                const ref = id ? db.ref('categories/'+id) : db.ref('categories').push();
                ref.set({name, icon}).then(() => {
                    document.getElementById('cat-name-in').value = "";
                    document.getElementById('edit-cat-id').value = "";
                    document.getElementById('cat-save-btn').innerText = "حفظ القسم";
                });
            }
        }

        function editCat(id) {
            const c = appData.categories[id];
            document.getElementById('edit-cat-id').value = id;
            document.getElementById('cat-name-in').value = c.name;
            document.getElementById('cat-icon-in').value = c.icon;
            document.getElementById('cat-save-btn').innerText = "تحديث اسم القسم";
        }

        function refreshAdmin() {
            const list = document.getElementById('admin-cats-display');
            const sel = document.getElementById('w-cat-sel-in');
            list.innerHTML = ""; sel.innerHTML = "";
            for(let id in appData.categories) {
                let c = appData.categories[id];
                sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
                list.innerHTML += `<div class="manage-row">
                    <span><i class="${c.icon}"></i> ${c.name}</span>
                    <div>
                        <button onclick="editCat('${id}')" style="background:#3498db; color:#fff; border:none; padding:5px 8px; border-radius:5px; cursor:pointer;">تعديل</button>
                        <button onclick="manageImgs('${c.name}')" style="background:var(--gold); color:#fff; border:none; padding:5px 8px; border-radius:5px; cursor:pointer;">الصور</button>
                        <button onclick="db.ref('categories/${id}').remove()" style="color:red; border:none; background:none; cursor:pointer;"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }
        }

        function saveWork() {
            const title = document.getElementById('w-title-in').value;
            const link = document.getElementById('w-link-in').value;
            const cat = document.getElementById('w-cat-sel-in').value;
            if(title && link) db.ref('works').push({title, link, cat}).then(() => {
                alert("تم الحفظ");
                document.getElementById('w-title-in').value = "";
                document.getElementById('w-link-in').value = "";
            });
        }

        function manageImgs(catName) {
            document.getElementById('sec1').style.display='none';
            document.getElementById('sec-imgs').style.display='block';
            const list = document.getElementById('imgs-control-list');
            list.innerHTML = `<h4>تحكم بصور: ${catName}</h4>`;
            for(let id in appData.works) {
                if(appData.works[id].cat === catName) {
                    list.innerHTML += `<div class="manage-row">
                        <img src="${appData.works[id].link}" style="width:40px; height:40px; object-fit:cover; border-radius:5px;">
                        <span>${appData.works[id].title}</span>
                        <button onclick="db.ref('works/${id}').remove()" style="color:red; border:none; background:none;"><i class="fas fa-trash"></i></button>
                    </div>`;
                }
            }
        }
    </script>
</body>
</html>
