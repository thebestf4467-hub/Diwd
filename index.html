<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>DIWDECOR</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #c19a6b; --dark: #1a1a1a; }
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: var(--dark); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; display: block; background: #eee; }
        #admin { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 2000; width: 85%; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1500; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; }
        .btn { background: var(--gold); color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header onclick="toggle()">
    <div style="font-size: 1.5rem; color: var(--gold); font-weight: bold;">DIWDECOR</div>
    <div style="font-size: 0.7rem;">اضغط هنا للإضافة</div>
</header>

<div class="container" id="output"></div>

<div class="overlay" id="overlay" onclick="toggle()"></div>
<div id="admin">
    <input type="text" id="t" placeholder="اسم التصميم">
    <input type="text" id="l" placeholder="رابط i.ibb.co المباشر">
    <button class="btn" onclick="send()">نشر الآن</button>
</div>

<script>
    const config = {
      apiKey: "AIzaSyB_Rj089s8Pwh5hrZjzAcki-gN7VL8JhB0",
      authDomain: "diwd-a7709.firebaseapp.com",
      databaseURL: "https://diwd-a7709-default-rtdb.firebaseio.com/",
      projectId: "diwd-a7709",
      storageBucket: "diwd-a7709.appspot.com",
      appId: "1:190314181686:web:97b7f8674522bdbb4d5497"
    };

    firebase.initializeApp(config);
    const db = firebase.database();

    function toggle() {
        const a = document.getElementById('admin');
        const o = document.getElementById('overlay');
        a.style.display = (a.style.display === 'block') ? 'none' : 'block';
        o.style.display = (o.style.display === 'block') ? 'none' : 'block';
    }

    function send() {
        const title = document.getElementById('t').value;
        const link = document.getElementById('l').value;
        if(title && link) {
            db.ref('works').push({ title: title, image: link }).then(() => {
                alert("تم الحفظ!");
                toggle();
            });
        }
    }

    db.ref('works').on('value', s => {
        const out = document.getElementById('output');
        const data = s.val();
        if(!data) { out.innerHTML = "المعرض فارغ"; return; }
        out.innerHTML = '<div class="gallery">';
        for(let id in data) {
            let item = data[id];
            // هذا السطر يقرأ الرابط سواء كان اسمه image أو img أو l أو url
            let img = item.image || item.img || item.l || item.url || "";
            let name = item.title || item.t || "بدون عنوان";
            out.innerHTML += `
                <div class="card">
                    <img src="${img}" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/300?text=Error+Link'">
                    <div style="padding:15px; text-align:center; font-weight:bold;">${name}</div>
                </div>`;
        }
        out.innerHTML += '</div>';
    });
</script>
</body>
</html>
